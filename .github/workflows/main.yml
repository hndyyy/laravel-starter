name: laravel

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Stage
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" >> .env

      - name: Build and Push Docker Image
        run: |
          IMG_NAME="ghcr.io/${{ github.repository_owner }}/laravel-app"
          TAG="v1.0.${{ github.run_number }}"
          
          echo "Building image: $IMG_NAME with tag $TAG"
          
          docker build -t $IMG_NAME:$TAG .
          docker push $IMG_NAME:$TAG
          
  test:
    name: Test Stage
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Start Application and Health Check
        run: |
          TAG="v1.0.${{ github.run_number }}"
          IMG_NAME="ghcr.io/${{ github.repository_owner }}/laravel-app"
          
          IMAGE_NAME_WITH_TAG="$IMG_NAME:$TAG" docker-compose up -d
          
          sleep 20
          
          curl -f http://localhost:8080 || exit 1

      - name: Stop Application
        if: always()
        run: docker-compose down

  release:
    name: Release Stage
    runs-on: self-hosted
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Create Git Tag
        run: |
          TAG_NAME="v1.0.${{ github.run_number }}"
          git tag $TAG_NAME
          git push origin $TAG_NAME
          echo "RELEASE_TAG=$TAG_NAME" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" >> .env

      - name: Build and Push Docker Image
        run: |
          IMG_NAME="ghcr.io/${{ github.repository_owner }}/laravel-app"
          
          docker build -t $IMG_NAME:${{ env.RELEASE_TAG }} -t $IMG_NAME:latest .
          docker push $IMG_NAME:${{ env.RELEASE_TAG }}
          docker push $IMG_NAME:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          generate_release_notes: true

  deploy:
    name: Deploy Stage
    runs-on: self-hosted
    needs: release
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Deploy to Server
        run: |
          IMAGE_NAME_WITH_TAG="${{ vars.IMAGE_NAME }}:latest" docker-compose up -d
